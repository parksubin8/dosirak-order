<style>

/* CALENDAR */

/* STATS */

<div class="app">
  <div class="header">
    <h1>🍱 도시락 주문 관리</h1>
    <span class="badge" id="deadlineBadge"></span>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('today')">오늘 주문</button>
    <button class="tab" onclick="switchTab('menu')">메뉴판</button>
    <button class="tab" onclick="switchTab('calendar')">월별 현황</button>
    <button class="tab" onclick="switchTab('stats')">월별 집계</button>
    <button class="tab" onclick="switchTab('members')">설정</button>
  </div>
  <div id="tabContent"></div>

<script>
const PRICE_DEFAULT = 7700;
const SHOP_NAME = '다온도시락';
const SHOP_TEL = '010-3036-6611';
const COLORS = ['#9FE1CB','#B5D4F4','#FAC775','#F4C0D1','#C0DD97','#CEB3F0','#F5C4B3','#5DCAA5','#F7C1C1','#D3D1C7'];
const MEMBER_DEFAULT = ['남정','최규호','오세윤','서기영','김진용','김태완','서유정','박수빈','송호범'];

let state = {
  members: [...MEMBER_DEFAULT],
  orders: {},
  salads: {},
  visitors: {},   // dateKey → 방문자 수
  settled: {},    // 'YYYY-MM' → {name: true/false}
  confirmed: {},
  menus: {},
  price: PRICE_DEFAULT,
  currentTab: 'today',
  calYear: new Date().getFullYear(),
  calMonth: new Date().getMonth(),
  statsYear: new Date().getFullYear(),
  statsMonth: new Date().getMonth(),
  menuWeek: 0,
  selectedDay: null,
};

function gk(y,m,d){ return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
function todayKey(){ const n=new Date(); return gk(n.getFullYear(),n.getMonth(),n.getDate()); }
function tomorrowKey(){ const n=new Date(); n.setDate(n.getDate()+1); return gk(n.getFullYear(),n.getMonth(),n.getDate()); }
function getAC(name){ let h=0; for(let c of name) h=(h+c.charCodeAt(0))%COLORS.length; return COLORS[h]; }
function getInit(name){ return name[0]; }

// 시간 상태: 'open'(4시前 신청가능), 'change'(당일4시~익일9:30 변경가능), 'closed'(9:30이후 완전마감)
function getTimeStatus(){
  const now=new Date(), h=now.getHours(), m=now.getMinutes();
  const minTotal = h*60+m;
  if(minTotal < 16*60) return 'open';
  if(minTotal < 24*60) return 'change';
  if(minTotal < 9*60+30) return 'change';
  return 'closed';
}

// ── Firebase 실시간 연동 ──────────────────────────
let firebaseReady = false;
function initFirebase(){
  loadMenusLocal();
  render();

  dbRef.on('value', (snapshot) => {
    const data = snapshot.val();
    if(data){
      state.members   = data.members   || [...MEMBER_DEFAULT];
      state.orders    = data.orders    || {};
      state.salads    = data.salads    || {};
      state.visitors  = data.visitors  || {};
      state.settled   = data.settled   || {};
      state.confirmed = data.confirmed || {};
      state.price     = data.price     || PRICE_DEFAULT;
    }
    firebaseReady = true;
    loadMenusLocal();
    render();
  }, (error) => {
    console.warn('Firebase 연결 실패:', error);
    showToast('⚠️ 실시간 연동 안 됨 - 오프라인 모드');
  });
}

function save(){
  dbRef.set({
    members:   state.members,
    orders:    state.orders,
    salads:    state.salads,
    visitors:  state.visitors,
    settled:   state.settled,
    confirmed: state.confirmed,
    price:     state.price
  }).catch(e => showToast('저장 실패 - 인터넷 연결 확인'));
}

// 메뉴 이미지는 용량이 커서 기기 로컬에 저장
function loadMenusLocal(){
  try{
    const m0=localStorage.getItem('dosirak-menu-'+weekKey(0));
    const m1=localStorage.getItem('dosirak-menu-'+weekKey(1));
    if(m0) state.menus[weekKey(0)]=m0;
    if(m1) state.menus[weekKey(1)]=m1;
  }catch(e){}
}
function saveMenu(wk,dataUrl){
  try{ localStorage.setItem('dosirak-menu-'+wk, dataUrl); }catch(e){}
}
function deleteMenuStorage(wk){
  try{ localStorage.removeItem('dosirak-menu-'+wk); }catch(e){}
}

function getWeekRange(off){
  const now=new Date(), day=now.getDay();
  const mon=new Date(now); mon.setDate(now.getDate()-(day===0?6:day-1)+off*7);
  const sun=new Date(mon); sun.setDate(mon.getDate()+6);
  return {start:mon,end:sun};
}
function weekKey(off){
  const {start}=getWeekRange(off);
  const y=start.getFullYear(), w=Math.floor((start-new Date(y,0,1))/(7*86400000));
  return `${y}-W${w}`;
}
function formatRange(off){
  const {start,end}=getWeekRange(off);
  const fmt=d=>`${d.getMonth()+1}/${d.getDate()}`;
  return `${start.getFullYear()}년 ${fmt(start)}(월) ~ ${fmt(end)}(일)`;
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

function updateBadge(){
  const b=document.getElementById('deadlineBadge'); if(!b)return;
  const now=new Date(), h=now.getHours(), m=now.getMinutes();
  const ts=getTimeStatus();
  const tKey=tomorrowKey();
  if(state.confirmed[tKey]){
    b.className='badge badge-closed'; b.textContent='✅ 주문 확정 완료';
  } else if(ts==='open'){
    b.className='badge badge-ok'; b.textContent=`✓ 마감까지 ${15-h}시간 ${59-m}분`;
  } else if(ts==='change'){
    b.className='badge badge-closed'; b.textContent='🔄 변경가능 (익일 9:30까지)';
  } else {
    b.className='badge badge-warn'; b.textContent='⏰ 변경 불가';
  }
}

function switchTab(t){
  state.currentTab=t;
  if(t==='calendar'){
    // 월별 현황 진입 시 내일 날짜 자동 선택
    const tmr=new Date(); tmr.setDate(tmr.getDate()+1);
    state.selectedDay=gk(tmr.getFullYear(),tmr.getMonth(),tmr.getDate());
    state.calYear=tmr.getFullYear();
    state.calMonth=tmr.getMonth();
  } else {
    state.selectedDay=null;
  }
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',['today','menu','calendar','stats','members'][i]===t));
  render();
}

function changeVisitor(key, delta){
  const cur = state.visitors[key] || 0;
  const next = Math.max(0, cur + delta);
  if(next === 0) delete state.visitors[key];
  else state.visitors[key] = next;
  save(); render();
}

function toggleSettled(yearMonth, name){
  if(!state.settled[yearMonth]) state.settled[yearMonth] = {};
  state.settled[yearMonth][name] = !state.settled[yearMonth][name];
  save(); render();
}

function toggleOrder(key,name){
  if(!state.orders[key]) state.orders[key]=[];
  const i=state.orders[key].indexOf(name);
  if(i>=0) state.orders[key].splice(i,1); else state.orders[key].push(name);
  save(); render();
}
function toggleSalad(key,name){
  if(!state.salads[key]) state.salads[key]=[];
  const i=state.salads[key].indexOf(name);
  if(i>=0) state.salads[key].splice(i,1); else state.salads[key].push(name);
  save(); render();
}

function buildSmsText(tKey, orders, salads){
  const [y,m,d]=tKey.split('-');
  const date=new Date(parseInt(y),parseInt(m)-1,parseInt(d));
  const days=['일','월','화','수','목','금','토'];
  const dayLabel=`${parseInt(m)}월 ${parseInt(d)}일(${days[date.getDay()]})`;
  const total=((orders.length+salads.length)*state.price).toLocaleString();
  let text=`안녕하세요, 한국환경공단입니다.\n${dayLabel} 도시락 주문 드립니다.\n\n`;
  if(orders.length>0) text+=`🍱 도시락 ${orders.length}개\n${orders.map((n,i)=>`  ${i+1}. ${n}`).join('\n')}\n\n`;
  if(salads.length>0) text+=`🥗 샐러드 ${salads.length}개\n${salads.map((n,i)=>`  ${i+1}. ${n}`).join('\n')}\n\n`;
  text+=`합계 ${(orders.length+salads.length)}개 / ${total}원\n감사합니다.`;
  return text;
}

function buildShareText(tKey, orders, salads){
  const [y,m,d]=tKey.split('-');
  const date=new Date(parseInt(y),parseInt(m)-1,parseInt(d));
  const days=['일','월','화','수','목','금','토'];
  const dosirakTotal=(orders.length*state.price).toLocaleString();
  const saladTotal=(salads.length*state.price).toLocaleString();
  const grandTotal=((orders.length+salads.length)*state.price).toLocaleString();
  let text=`🍱 ${parseInt(m)}월 ${parseInt(d)}일(${days[date.getDay()]}) 도시락 주문 확정\n\n`;
  if(orders.length>0) text+=`🍱 도시락 (${orders.length}명)\n${orders.map((n,i)=>`${i+1}. ${n}`).join('\n')}\n`;
  if(salads.length>0) text+=`\n🥗 샐러드 (${salads.length}명)\n${salads.map((n,i)=>`${i+1}. ${n}`).join('\n')}\n`;
  text+=`\n💰 총 ${(orders.length+salads.length)}개 × ${state.price.toLocaleString()}원 = ${grandTotal}원\n📞 ${SHOP_NAME} ${SHOP_TEL}`;
  return text;
}

function hideModal(){ document.getElementById('modalOverlay').style.display='none'; }

function confirmOrder(){
  const tKey=tomorrowKey();
  const orders=state.orders[tKey]||[];
  const salads=state.salads[tKey]||[];
  if(orders.length===0&&salads.length===0){ showToast('주문 인원이 없어요'); return; }
  const smsText=buildSmsText(tKey,orders,salads);
  showModal(`<div class="modal-box">
    <div class="modal-title">📱 주문 확정 & 문자 발송</div>

function doConfirmOrder(){
  const tKey=tomorrowKey();
  const orders=state.orders[tKey]||[];
  const salads=state.salads[tKey]||[];

  state.confirmed[tKey]=true;
  save(); hideModal(); render();
  showToast('✅ 확정 완료! 문자 문구가 복사됐어요');
}

function doCancelConfirm(){

function copyShare(){

  const tomorrowK=tomorrowKey();
  const isTomorrowSel=sel===tomorrowK;

  return `<div class="cal-nav-row">
    <button class="nav-btn" onclick="moveMonth(-1)">‹</button>
    <span class="cal-title-text">${y}년 ${m+1}월</span>
    <button class="nav-btn" onclick="moveMonth(1)">›</button>
  </div>
  <div style="font-size:12px;color:#1D9E75;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between">
    <span>📌 날짜 클릭 → 주문 수정</span>
    <button onclick="switchTab('today')" style="font-size:11px;padding:4px 10px;border:1px solid #1D9E75;border-radius:20px;background:transparent;color:#1D9E75;cursor:pointer;">← 오늘 주문</button>
  </div>
  <div class="cal-grid">${dlabels}${cells}</div>
  ${panel}
  <div class="legend" style="margin-top:12px">${state.members.map(nm=>`<div class="legend-item"><div class="legend-dot" style="background:${getAC(nm)}"></div>${nm}</div>`).join('')}</div>`;
}
function selectDay(key){ state.selectedDay=state.selectedDay===key?null:key; render(); }
function moveMonth(d){ state.calMonth+=d; if(state.calMonth>11){state.calMonth=0;state.calYear++;} if(state.calMonth<0){state.calMonth=11;state.calYear--;} state.selectedDay=null; render(); }

/* STATS */
function renderStats(){
  const {statsYear:y,statsMonth:m}=state;
  const yearMonth=`${y}-${String(m+1).padStart(2,'0')}`;
  const last=new Date(y,m+1,0).getDate();
  let totalOrders=0,totalSalads=0,totalVisitors=0;
  const pp={}; const ps={}; state.members.forEach(n=>{pp[n]=0;ps[n]=0;});
  for(let d=1;d<=last;d++){
    const ord=state.orders[gk(y,m,d)]||[];
    const sal=state.salads[gk(y,m,d)]||[];
    const vis=state.visitors[gk(y,m,d)]||0;
    totalOrders+=ord.length; totalSalads+=sal.length; totalVisitors+=vis;
    ord.forEach(n=>{if(pp[n]!==undefined)pp[n]++;});
    sal.forEach(n=>{if(ps[n]!==undefined)ps[n]++;});
  }
  const maxC=Math.max(1,...Object.values(pp));
  const settledMap=state.settled[yearMonth]||{};
  const rows=state.members.map(nm=>{
    const cnt=pp[nm]||0, scnt=ps[nm]||0, pct=Math.round(cnt/maxC*100), ac=getAC(nm);
    const amt=(cnt+scnt)*state.price;
    const isSettled=!!settledMap[nm];
    return `<div class="person-row" style="${isSettled?'opacity:0.55':''}">
      <div class="avatar" style="background:${ac}20;color:${ac};width:28px;height:28px;font-size:11px">${getInit(nm)}</div>
      <div class="p-name">${nm}</div>
      <div class="p-bar-wrap"><div class="p-bar-bg"><div class="p-bar" style="width:${pct}%"></div></div></div>
      <span class="p-cnt" style="min-width:52px">🍱${cnt} 🥗${scnt}</span>
      <span class="p-amt" style="min-width:62px">${amt.toLocaleString()}원</span>
      <button onclick="toggleSettled('${yearMonth}','${nm}')" style="flex-shrink:0;padding:4px 8px;border-radius:20px;border:1px solid ${isSettled?'#1D9E75':'#D1D1D6'};background:${isSettled?'#EAF3DE':'transparent'};color:${isSettled?'#1D9E75':'#999'};font-size:11px;cursor:pointer;white-space:nowrap">
        ${isSettled?'✅ 정산완료':'미정산'}
      </button>
    </div>`;
  }).join('');
  const grandTotal=(totalOrders+totalSalads+totalVisitors)*state.price;
  const settledCount=Object.values(settledMap).filter(Boolean).length;
  return `<div class="cal-nav-row">
    <button class="nav-btn" onclick="moveStats(-1)">‹</button>
    <span class="cal-title-text">${y}년 ${m+1}월</span>
    <button class="nav-btn" onclick="moveStats(1)">›</button>
  </div>
  <div class="stats-cards">
    <div class="stat-card"><div class="stat-lbl">🍱 도시락</div><div class="stat-val">${totalOrders}<small>건</small></div></div>
    <div class="stat-card"><div class="stat-lbl">🥗 샐러드</div><div class="stat-val">${totalSalads}<small>건</small></div></div>
    <div class="stat-card"><div class="stat-lbl">👤 방문자</div><div class="stat-val">${totalVisitors}<small>명</small></div></div>
  </div>
  <div style="background:#FFFFFF;border:0.5px solid #D1D1D6;border-radius:14px;padding:12px 14px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center">
    <span style="font-size:13px;color:#6E6E73">이달 총액</span>
    <div style="text-align:right">
      <div style="font-size:20px;font-weight:600;color:#1C1C1E">${grandTotal.toLocaleString()}원</div>
      <div style="font-size:11px;color:#1D9E75">${settledCount}명 정산완료 / ${state.members.length}명</div>
    </div>
  </div>
  <div class="person-table">${rows||'<div style="text-align:center;padding:2rem;color:#6E6E73;font-size:13px">데이터 없음</div>'}</div>`;
}
function moveStats(d){ state.statsMonth+=d; if(state.statsMonth>11){state.statsMonth=0;state.statsYear++;} if(state.statsMonth<0){state.statsMonth=11;state.statsYear--;} render(); }

/* MEMBERS */
function renderMembers(){
  const rows=state.members.map((m,i)=>{
    const ac=getAC(m);
    return `<div class="mlist-row">
      <div class="member-info"><div class="avatar" style="background:${ac}20;color:${ac}">${getInit(m)}</div><span style="font-size:14px">${m}</span></div>
      <button class="del-btn" onclick="delMember(${i})">삭제</button>
    </div>`;
  }).join('');
  return `<div class="price-setting">
    <span class="price-lbl">🍱🥗 1인 금액</span>
    <input class="price-input" type="number" id="priceInput" value="${state.price}" step="100">
    <button class="save-btn" onclick="savePrice()">저장</button>
  </div>
  <div class="mlist">${rows}</div>
  <div class="add-row">
    <input id="newName" type="text" placeholder="팀원 이름" onkeydown="if(event.key==='Enter')addMember()">
    <button class="add-btn" onclick="addMember()">+ 추가</button>
  </div>`;
}
function savePrice(){ const v=parseInt(document.getElementById('priceInput').value); if(v>0){state.price=v;save();showToast(`도시락 ${v.toLocaleString()}원으로 저장됐어요`);} }
function saveSaladPrice(){ const v=parseInt(document.getElementById('saladPriceInput').value); if(v>0){state.price=v;save();showToast(`샐러드 ${v.toLocaleString()}원으로 저장됐어요`);} }
function addMember(){ const inp=document.getElementById('newName'); const n=inp.value.trim(); if(!n||state.members.includes(n))return; state.members.push(n); inp.value=''; save();render(); }
function delMember(i){ if(!confirm(`'${state.members[i]}' 삭제할까요?`))return; state.members.splice(i,1); save();render(); }

function render(){
  const el=document.getElementById('tabContent');
  if(state.currentTab==='today') el.innerHTML=renderToday();
  else if(state.currentTab==='menu') el.innerHTML=renderMenu();
  else if(state.currentTab==='calendar') el.innerHTML=renderCalendar();
  else if(state.currentTab==='stats') el.innerHTML=renderStats();
  else el.innerHTML=renderMembers();
  updateBadge();
}

initFirebase();
setInterval(updateBadge, 60000);
</script>

</body>
</html>
